name: Go CI

on:
  pull_request:
    branches: [ "*" ]

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
      - name: Build application
        run: go build -v ./...

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run unit tests with coverage
        run: go test -v -count=1 -coverprofile=cover.out -covermode=atomic -run '_Unit$' ./...

      - name: Check test coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          profile: cover.out
          threshold-total: 10

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint-and-build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Run integration tests
        run: go test -v -count=1 -cover -run '_Integration$' ./...

  smoke-test:
    name: Smoke Test (Docker + curl)
    runs-on: ubuntu-latest
    needs: [ lint-and-build, unit-test, integration-test ]   # Запускается только после всех предыдущих
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t cloud-practice-app .

      - name: Run Docker container
        run: |
          docker run -d --name app -p 8080:8080 cloud-practice-app
          sleep 3

      - name: Test endpoint with curl
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/hello)
          if [ "$response" != "200" ]; then
            echo "Smoke test failed! Expected 200, got $response"
            docker logs app
            exit 1
          fi
          echo "Smoke test passed! Endpoint returned 200 OK"

      - name: Stop container
        if: always()
        run: docker stop app && docker rm app